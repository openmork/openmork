# Example LLM Gateway config (DEV)
# Do not commit real API keys. Prefer api_key_env.

policy:
  cooldown_seconds: 60
  quarantine_seconds: 3600
  retries:
    max_attempts: 2
    backoff_ms: 300

providers:
  - id: openrouter-primary
    provider: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    models: ["*"]
    weight: 3
    cost_tier: 2
    latency_tier: 2

  - id: zai-fast
    provider: zai
    base_url: https://api.z.ai/api/paas/v4
    api_key_env: GLM_API_KEY
    models: ["*"]
    weight: 2
    cost_tier: 1
    latency_tier: 1

  - id: kimi-backup
    provider: kimi-coding
    base_url: https://api.moonshot.cn/v1
    api_key_env: KIMI_API_KEY
    models: ["*"]
    weight: 1
    cost_tier: 2
    latency_tier: 3
