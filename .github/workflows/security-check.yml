name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-and-remotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run secret/remote scanner
        run: python scripts/security/check_secrets.py --all-files
